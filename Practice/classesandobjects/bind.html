<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bind</title>
</head>
<body>
    <button>button clicked</button>
</body>
<script>
    class React{
        constructor(){
            this.library= "React",
            this.server = "https://localhost:5173"
            //requirement
            document.querySelector("button")
            .addEventListener("click", this.handleClicked.bind(this))
        }
        handleClicked(){
            console.log("button clicked");
            console.log(this);
        }
    }
    const app = new React();

</script>
</html>
